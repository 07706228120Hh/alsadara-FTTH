plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace = "com.alsadara.ftth_project" // ضع اسم الحزمة المحدث
    compileSdk = 35 // تحديث إلى SDK 35

    compileOptions {
        // تحديث إلى Java 17 لحل مشاكل التوافق
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
        // تفعيل core library desugaring
        coreLibraryDesugaringEnabled true
    }

    kotlinOptions {
        // تحديث JVM Target إلى الإصدار 17
        jvmTarget = "17"
    }

    defaultConfig {
        applicationId = "com.alsadara.ftth_project" // اسم التطبيق المحدث
        minSdkVersion flutter.minSdkVersion // أقل إصدار لنظام Android مدعوم (Android 5.0 Lollipop)
        targetSdk = 35 // تحديث إلى SDK 35
        versionCode = 10
        versionName = "1.2.4"

        // تمكين دعم الأذونات في وقت التشغيل (الإعداد الافتراضي يدعم ذلك، لكن يتم تأكيده هنا)
        multiDexEnabled true
    }

    signingConfigs {
        release {
            keyAlias 'my-key-alias' // اسم المفتاح
            keyPassword '07727787789'      // كلمة مرور المفتاح
            storeFile file('release.keystore') // مسار ملف keystore
            storePassword '07727787789'   // كلمة مرور keystore
        }
    }

    buildTypes {
        release {
            signingConfig signingConfigs.release
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    // التحقق من توافقات المكتبات والإصدارات
    lint {
        checkReleaseBuilds false
        abortOnError false
    }
}

flutter {
    source = "../.."
}

dependencies {
    // إضافة core library desugaring
    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.0.4'

    // إضافة مكتبات AndroidX إذا لم تكن موجودة
    implementation "androidx.core:core-ktx:1.10.1"
    implementation "androidx.appcompat:appcompat:1.6.1"
    implementation "androidx.constraintlayout:constraintlayout:2.1.4"
    implementation "com.google.android.material:material:1.9.0"

    // مكتبات الموقع الجغرافي
    implementation "com.google.android.gms:play-services-location:21.0.1"

    // مكتبات أخرى قد تحتاجها
    implementation "androidx.multidex:multidex:2.0.1"
}
