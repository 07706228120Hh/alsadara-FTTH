# GitHub Actions Workflow for Flutter Windows App
# يقوم ببناء التطبيق تلقائياً عند رفع tag جديد ونشره كـ Release

name: Build and Release Windows App

on:
  push:
    tags:
      - 'v*'  # يعمل عند رفع tag مثل v1.2.9

  # للاختبار اليدوي
  workflow_dispatch:

env:
  FLUTTER_VERSION: '3.29.0'

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    
    steps:
      # 1. استنساخ المشروع
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. تثبيت Flutter
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      # 3. إنشاء ملف .env (اختياري - أضف الأسرار في GitHub Secrets)
      - name: Create .env file
        run: |
          echo "# Environment Variables" > .env
          echo "FTTH_API_BASE_URL=${{ secrets.FTTH_API_BASE_URL }}" >> .env
        shell: bash

      # 4. الحصول على الحزم
      - name: Get dependencies
        run: flutter pub get

      # 5. بناء التطبيق للـ Windows
      - name: Build Windows App
        run: flutter build windows --release

      # 6. إنشاء مجلد التوزيع
      - name: Prepare distribution folder
        run: |
          mkdir -p Distribution
          cp -r build/windows/x64/runner/Release/* Distribution/
        shell: bash

      # 7. ضغط الملفات
      - name: Create ZIP archive
        run: |
          Compress-Archive -Path Distribution/* -DestinationPath Alsadara-Windows-${{ github.ref_name }}.zip
        shell: pwsh

      # 8. إنشاء المثبت باستخدام Inno Setup (اختياري)
      - name: Build Installer with Inno Setup
        if: false  # غيّر إلى true إذا كان لديك ملف .iss
        run: |
          choco install innosetup -y
          iscc alsadara_installer.iss
        shell: pwsh

      # 9. رفع الملفات كـ Artifacts
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            Alsadara-Windows-${{ github.ref_name }}.zip
            Distribution/

      # 10. إنشاء GitHub Release
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          name: 'الصدارة ${{ github.ref_name }}'
          body: |
            ## 🎉 إصدار جديد من تطبيق الصدارة!
            
            ### التحميل:
            - **Windows**: قم بتحميل ملف `Alsadara-Windows-${{ github.ref_name }}.zip`
            - فك الضغط وشغّل `alsadara.exe`
            
            ### ملاحظات الإصدار:
            تحقق من ملف CHANGELOG.md للتفاصيل
            
            ---
            *تم البناء تلقائياً بواسطة GitHub Actions*
          files: |
            Alsadara-Windows-${{ github.ref_name }}.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # وظيفة إضافية: بناء MSIX (اختياري)
  build-msix:
    runs-on: windows-latest
    if: false  # غيّر إلى true لتفعيل بناء MSIX
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          
      - name: Get dependencies
        run: flutter pub get
        
      - name: Build MSIX
        run: |
          flutter pub add msix
          flutter pub run msix:create
          
      - name: Upload MSIX
        uses: actions/upload-artifact@v4
        with:
          name: msix-build
          path: build/windows/x64/runner/Release/*.msix
