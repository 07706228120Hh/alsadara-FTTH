# CI/CD - بناء التطبيق
# يعمل عند إنشاء release أو يدوياً
# تطبيق الصدارة - FTTH

name: 🏗️ Build Application

on:
  workflow_dispatch:
    inputs:
      build_windows:
        description: 'Build Windows'
        type: boolean
        default: true
      build_android:
        description: 'Build Android'
        type: boolean
        default: false

  release:
    types: [published]

jobs:
  # ═══════════════════════════════════════
  # بناء Windows
  # ═══════════════════════════════════════
  build-windows:
    name: 🪟 Build Windows
    runs-on: windows-latest
    if: ${{ github.event.inputs.build_windows == 'true' || github.event_name == 'release' }}

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🎯 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.0'
          channel: 'stable'
          cache: true

      - name: 📦 Get dependencies
        run: flutter pub get

      - name: 🏗️ Build Windows
        run: flutter build windows --release

      - name: 📦 Create artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: build/windows/x64/runner/Release/
          retention-days: 30

  # ═══════════════════════════════════════
  # بناء Android
  # ═══════════════════════════════════════
  build-android:
    name: 🤖 Build Android
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.build_android == 'true' || github.event_name == 'release' }}

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 🎯 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.0'
          channel: 'stable'
          cache: true

      - name: 📦 Get dependencies
        run: flutter pub get

      - name: 🏗️ Build APK
        run: flutter build apk --release

      - name: 📦 Create artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-release
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
