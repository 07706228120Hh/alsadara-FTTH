# CI/CD - إصدار التطبيق
# ينشئ Release تلقائياً مع الملفات (ZIP + Setup.exe)
# تطبيق الصدارة - FTTH

name: 🚀 Create Release

on:
  workflow_dispatch:

jobs:
  # ═══════════════════════════════════════
  # بناء وإصدار
  # ═══════════════════════════════════════
  release:
    name: 📦 Build & Release
    runs-on: windows-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🎯 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.0'
          channel: 'stable'
          cache: true

      - name: 📦 Get dependencies
        run: flutter pub get

      - name: 🧪 Run tests
        run: flutter test

      - name: 🏗️ Build Windows
        run: flutter build windows --release

      - name: 📋 Extract version info
        id: version
        run: |
          $version = "${{ github.ref_name }}" -replace 'v', ''
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT

      - name: 📁 Create ZIP
        run: |
          Compress-Archive -Path "build\windows\x64\runner\Release\*" -DestinationPath "Alsadara-${{ github.ref_name }}-windows.zip"

      - name: 🔧 Build Inno Setup Installer
        run: |
          choco install innosetup -y --no-progress
          iscc installer.iss

      - name: 🚀 Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "الصدارة FTTH ${{ steps.version.outputs.VERSION }}"
          body: |
            ## 🆕 إصدار جديد - الصدارة FTTH ${{ steps.version.outputs.VERSION }}

            ### 📥 التحميل
            - **المثبّت (مستحسن)**: `Alsadara-Setup-${{ github.ref_name }}.exe`
            - **ملف مضغوط**: `Alsadara-${{ github.ref_name }}-windows.zip`

            ### 🔄 التحديث التلقائي
            التطبيق يدعم التحديث التلقائي - سيتم تثبيت الإصدارات الجديدة تلقائياً.

            ---
            📅 تاريخ الإصدار: ${{ github.event.head_commit.timestamp }}
          files: |
            Alsadara-${{ github.ref_name }}-windows.zip
            build/installer/Alsadara-Setup-${{ github.ref_name }}.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
